<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Rolodex — People Notes</title>

<!-- iOS "Add to Home Screen" behavior -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rolodex">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B1F23">

<style>
  :root{
    --ink: #1B1F23;
    --ink-soft: #262B31;
    --ink-line: #363C43;
    --paper: #EFE6D8;
    --paper-dim: #E3D8C4;
    --teal: #3F6659;
    --teal-bright: #5C8C7B;
    --gold: #C99A3E;
    --rust: #B3573F;
    --ink-text: #EDE7DA;
    --ink-text-dim: #A9A79E;
    --paper-text: #23201A;

    --font-display: "Fraunces", Georgia, serif;
    --font-body: "IBM Plex Sans", -apple-system, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;
  }

  @font-face {
    font-family: "Fraunces";
    src: local("Fraunces");
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--ink);
    color: var(--ink-text);
    font-family: var(--font-body);
    height: 100%;
    overscroll-behavior-y: none;
  }

  body{
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    min-height: 100vh;
  }

  /* ---------- Header ---------- */
  header{
    position: sticky; top:0; z-index: 20;
    background: linear-gradient(var(--ink) 80%, transparent);
    padding: 18px 16px 10px;
  }

  .brand{
    display:flex; align-items:baseline; justify-content:space-between;
    margin-bottom: 14px;
  }
  .brand h1{
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 26px;
    letter-spacing: 0.2px;
    margin: 0;
  }
  .brand h1 span{ color: var(--gold); font-style: italic; }
  .count-badge{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-text-dim);
    border: 1px solid var(--ink-line);
    padding: 3px 8px;
    border-radius: 20px;
  }

  .search-row{
    display:flex; gap:8px;
  }
  .search-row input[type="text"]{
    flex:1;
    background: var(--ink-soft);
    border: 1px solid var(--ink-line);
    color: var(--ink-text);
    padding: 11px 14px;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 15px;
  }
  .search-row input::placeholder{ color: var(--ink-text-dim); }
  .search-row input:focus{ outline: 2px solid var(--teal-bright); outline-offset: 1px; }

  .tag-scroll{
    display:flex; gap:8px; overflow-x:auto; margin-top:10px;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .tag-scroll::-webkit-scrollbar{ display:none; }
  .tag-chip{
    flex: none;
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 11px;
    border-radius: 20px;
    border: 1px solid var(--ink-line);
    background: transparent;
    color: var(--ink-text-dim);
    cursor: pointer;
    white-space: nowrap;
  }
  .tag-chip.active{
    background: var(--gold);
    border-color: var(--gold);
    color: #23200f;
    font-weight: 600;
  }

  /* ---------- Category management row ---------- */
  .cat-manage-row{
    display:flex; justify-content: flex-end;
    max-width: 760px; margin: 0 auto 12px;
    padding: 0 16px;
  }
  .add-cat-btn{
    font-family: var(--font-mono); font-size: 12px;
    padding: 7px 12px; border-radius: 20px;
    border: 1px dashed var(--ink-line);
    background: transparent; color: var(--ink-text-dim);
    cursor: pointer;
  }
  .add-cat-btn:active{ background: var(--ink-soft); }

  /* ---------- Category sections ---------- */
  main{
    padding: 6px 16px 100px;
    max-width: 760px;
    margin: 0 auto;
  }

  .cat-section{ margin-bottom: 10px; }
  .cat-header{
    display:flex; align-items:center; gap:8px;
    padding: 12px 4px;
    cursor: pointer;
    border-bottom: 1px solid var(--ink-line);
  }
  .cat-header .chevron{
    font-size: 11px; color: var(--ink-text-dim); width: 12px; flex:none;
  }
  .cat-header .cat-name{
    font-family: var(--font-display); font-weight: 600; font-size: 17px;
    flex: 1;
  }
  .cat-header .cat-count{
    font-family: var(--font-mono); font-size: 11px; color: var(--ink-text-dim);
  }
  .cat-header .cat-del{
    background:none; border:none; color: var(--ink-text-dim);
    font-size: 14px; cursor:pointer; padding: 2px 6px;
  }
  .cat-header .cat-del:active{ color: var(--rust); }

  .cat-body{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    padding: 14px 2px 4px;
  }
  .cat-body.collapsed{ display:none; }

  .empty-state{
    text-align:center;
    padding: 60px 20px;
    color: var(--ink-text-dim);
  }
  .empty-state .glyph{ font-size: 40px; margin-bottom: 10px; }
  .empty-state h2{
    font-family: var(--font-display);
    font-weight: 500;
    color: var(--ink-text);
    font-size: 20px;
    margin: 0 0 6px;
  }
  .empty-state p{ margin: 0; font-size: 14px; line-height: 1.5; }

  /* ---------- Card ---------- */
  .card{
    position: relative;
    background: var(--paper);
    color: var(--paper-text);
    border-radius: 3px 10px 10px 3px;
    padding: 14px 14px 14px;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.25);
    transition: transform .15s ease, box-shadow .15s ease;
    border-left: 5px solid var(--teal);
  }
  .card:active{ transform: scale(0.97); }
  @media (hover:hover){
    .card:hover{ transform: translateY(-2px); box-shadow: 0 8px 18px rgba(0,0,0,0.32); }
  }

  .card-row{ display:flex; gap:10px; align-items:flex-start; margin-bottom: 8px; }
  .avatar{
    width:42px; height:42px; border-radius:50%; flex:none;
    background-size: cover; background-position: center;
    background-color: var(--teal);
    color: var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:600; font-size:16px;
  }
  .card h3{
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    margin: 2px 0 0;
    line-height: 1.25;
  }
  .card .notes-preview{
    font-size: 12.5px;
    color: #5c5748;
    margin-bottom: 8px;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .chips{ display:flex; flex-wrap:wrap; gap:4px; }
  .card .chip{
    font-family: var(--font-mono);
    font-size: 10px;
    background: rgba(63,102,89,0.14);
    color: var(--teal);
    padding: 2px 7px;
    border-radius: 20px;
  }

  /* ---------- FAB ---------- */
  .fab{
    position: fixed;
    right: 20px;
    bottom: calc(24px + env(safe-area-inset-bottom));
    width: 58px; height: 58px;
    border-radius: 50%;
    background: var(--gold);
    color: #23200f;
    border: none;
    font-size: 28px;
    font-weight: 400;
    box-shadow: 0 6px 18px rgba(0,0,0,0.4);
    cursor: pointer;
    z-index: 30;
    display:flex; align-items:center; justify-content:center;
  }
  .fab:active{ transform: scale(0.94); }

  /* ---------- Modal ---------- */
  .overlay{
    position: fixed; inset:0;
    background: rgba(0,0,0,0.55);
    z-index: 50;
    display:none;
    align-items: flex-end;
  }
  .overlay.open{ display:flex; }
  @media (min-width: 640px){
    .overlay{ align-items:center; justify-content:center; }
  }

  .sheet{
    background: var(--ink-soft);
    width: 100%;
    max-width: 560px;
    max-height: 92vh;
    overflow-y: auto;
    border-radius: 18px 18px 0 0;
    padding: 20px 18px calc(28px + env(safe-area-inset-bottom));
    animation: slideup .22s ease;
  }
  @media (min-width: 640px){
    .sheet{ border-radius: 16px; padding-bottom: 24px; }
  }
  @keyframes slideup{ from{ transform: translateY(24px); opacity:0;} to{ transform:none; opacity:1; } }
  @media (prefers-reduced-motion: reduce){ .sheet{ animation:none; } }

  .sheet-head{
    display:flex; justify-content: space-between; align-items:center;
    margin-bottom: 16px;
  }
  .sheet-head h2{
    font-family: var(--font-display);
    font-size: 21px; margin:0; font-weight: 600;
  }
  .icon-btn{
    background:none; border:none; color: var(--ink-text-dim);
    font-size: 22px; cursor:pointer; padding: 4px 8px;
  }

  label{
    display:block;
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-text-dim);
    margin: 16px 0 6px;
  }
  label:first-of-type{ margin-top:0; }
  input[type="text"], textarea, select{
    width:100%;
    background: var(--ink);
    border: 1px solid var(--ink-line);
    color: var(--ink-text);
    padding: 10px 12px;
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 15px;
  }
  textarea{ min-height: 76px; resize: vertical; line-height:1.4; }
  input:focus, textarea:focus, select:focus{ outline: 2px solid var(--teal-bright); outline-offset:1px; }
  .hint{ font-size: 12px; color: var(--ink-text-dim); margin-top: 4px; }

  /* Photo picker */
  .photo-row{ display:flex; align-items:center; gap:14px; }
  .photo-preview{
    width: 72px; height: 72px; border-radius: 50%;
    background: var(--ink); border: 1px dashed var(--ink-line);
    background-size: cover; background-position: center;
    display:flex; align-items:center; justify-content:center;
    color: var(--ink-text-dim); font-family: var(--font-mono); font-size: 10px;
    text-align:center; cursor:pointer; flex:none;
  }
  .photo-actions{ display:flex; flex-direction:column; gap:8px; }
  .photo-btn{
    background: var(--ink-line); border:none; color: var(--ink-text);
    border-radius: 8px; padding: 8px 12px; font-size: 13px; cursor:pointer;
    font-family: var(--font-body);
  }
  .photo-btn.remove{ background: transparent; border: 1px solid var(--ink-line); color: var(--rust); }

  /* Category select row */
  .cat-select-row{ display:flex; gap:8px; }
  .cat-select-row select{ flex:1; }
  .cat-select-row button{
    flex:none; background: var(--ink-line); border:none; color: var(--ink-text);
    border-radius: 8px; padding: 0 14px; font-size: 13px; cursor:pointer;
  }

  .conn-row{ display:flex; gap:8px; margin-bottom:8px; }
  .conn-row select{ flex: 1.3; }
  .conn-row input{ flex: 1; }
  .conn-row button{
    flex: none;
    background: var(--ink-line); border:none; color: var(--ink-text);
    border-radius: 8px; width: 38px; font-size: 18px; cursor:pointer;
  }
  .conn-list{ margin: 6px 0 4px; }
  .conn-list .conn-item{
    display:flex; justify-content:space-between; align-items:center;
    background: var(--ink); border:1px solid var(--ink-line);
    border-radius: 8px; padding: 8px 10px; margin-bottom: 6px;
    font-size: 14px;
  }
  .conn-item button{
    background:none; border:none; color: var(--rust); font-size: 16px; cursor:pointer;
  }

  .sheet-actions{
    display:flex; gap:10px; margin-top: 22px;
  }
  .btn{
    flex:1; padding: 12px; border-radius: 10px; border:none;
    font-family: var(--font-body); font-weight: 600; font-size: 15px; cursor:pointer;
  }
  .btn-primary{ background: var(--teal-bright); color: #0d1512; }
  .btn-danger{ background: transparent; color: var(--rust); border: 1px solid var(--rust); flex: 0.6; }
  .btn-ghost{ background: transparent; color: var(--ink-text-dim); border: 1px solid var(--ink-line); flex: 0.6; }

  /* ---------- Detail view ---------- */
  .detail-head-row{ display:flex; gap:14px; align-items:center; margin-bottom: 4px; }
  .detail-avatar{
    width: 64px; height: 64px; border-radius: 50%; flex:none;
    background-size: cover; background-position: center;
    background-color: var(--teal); color: var(--paper);
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-display); font-weight:600; font-size: 24px;
  }
  .detail-tab{
    font-family: var(--font-mono); font-size: 11px; color: var(--gold);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
  }
  .detail-name{ font-family: var(--font-display); font-size: 25px; font-weight:600; margin: 0; }
  .detail-section{ margin-top: 18px; }
  .detail-section h4{
    font-family: var(--font-mono); font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink-text-dim); margin: 0 0 8px;
  }
  .detail-facts{ font-size: 15px; line-height: 1.55; white-space: pre-wrap; }
  .detail-chips{ display:flex; flex-wrap:wrap; gap:6px; }
  .detail-chip{
    font-family: var(--font-mono); font-size: 12px;
    background: rgba(201,154,62,0.16); color: var(--gold);
    padding: 4px 10px; border-radius: 20px;
  }
  .link-card{
    display:flex; align-items:center; justify-content:space-between;
    background: var(--ink); border:1px solid var(--ink-line);
    border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    cursor:pointer;
  }
  .link-card:active{ background: var(--ink-line); }
  .link-card .rel{ font-family: var(--font-mono); font-size: 11px; color: var(--teal-bright); }
  .link-card .nm{ font-size: 15px; margin-top:1px; }
  .link-card .arrow{ color: var(--ink-text-dim); }

  .toast{
    position: fixed; left:50%; bottom: 100px; transform: translateX(-50%);
    background: var(--paper); color: var(--paper-text);
    padding: 10px 18px; border-radius: 30px; font-size: 13px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.35);
    z-index: 80; opacity:0; pointer-events:none; transition: opacity .2s ease, transform .2s ease;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(-6px); }

  .footer-actions{
    display:flex; justify-content:center; gap: 18px;
    padding: 6px 0 30px; color: var(--ink-text-dim);
    font-family: var(--font-mono); font-size: 11px;
  }
  .footer-actions button{
    background:none; border:none; color: var(--ink-text-dim);
    font-family: var(--font-mono); font-size: 11px; cursor:pointer;
    text-decoration: underline; text-underline-offset: 3px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Rolo<span>dex</span></h1>
    <span class="count-badge" id="countBadge">0 people</span>
  </div>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search name, notes, or tags…">
  </div>
  <div class="tag-scroll" id="tagScroll"></div>
</header>

<div class="cat-manage-row">
  <button class="add-cat-btn" id="addCategoryBtn">+ New category</button>
</div>

<main>
  <div id="categoriesWrap"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="glyph">◆</div>
    <h2>No one here yet</h2>
    <p>Tap the + button to add the first person you want to remember.</p>
  </div>
  <div class="footer-actions">
    <button id="exportBtn">Export backup</button>
    <button id="importBtn">Import backup</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>
</main>

<button class="fab" id="addFab" aria-label="Add person">+</button>

<!-- Edit / Add sheet -->
<div class="overlay" id="editOverlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="editTitle">New person</h2>
      <button class="icon-btn" id="closeEdit">✕</button>
    </div>

    <label for="fName">Name</label>
    <input type="text" id="fName" placeholder="Full name">

    <label>Photo</label>
    <div class="photo-row">
      <div class="photo-preview" id="photoPreview">+ Add</div>
      <input type="file" id="photoInput" accept="image/*" style="display:none;">
      <div class="photo-actions">
        <button type="button" class="photo-btn" id="choosePhotoBtn">Choose photo</button>
        <button type="button" class="photo-btn remove" id="removePhotoBtn" style="display:none;">Remove photo</button>
      </div>
    </div>

    <label for="fCategory">Category</label>
    <div class="cat-select-row">
      <select id="fCategory"><option value="">Uncategorized</option></select>
      <button type="button" id="newCatFromEdit">+ New</button>
    </div>

    <label for="fTags">Tags</label>
    <input type="text" id="fTags" placeholder="comma, separated, tags">
    <div class="hint">Used for filtering — e.g. "hiking, met-2023"</div>

    <label for="fNotes">Notes</label>
    <textarea id="fNotes" placeholder="Anything worth remembering — job, hometown, family, how you met, what they like…"></textarea>

    <label>Connections</label>
    <div class="conn-list" id="connList"></div>
    <div class="conn-row">
      <select id="connPerson"></select>
      <input type="text" id="connLabel" placeholder="relationship (e.g. sister)">
      <button id="connAdd" type="button">+</button>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-danger" id="deleteBtn" style="display:none;">Delete</button>
      <button class="btn btn-primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<!-- Detail view sheet -->
<div class="overlay" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-head">
      <span></span>
      <button class="icon-btn" id="closeDetail">✕</button>
    </div>

    <div class="detail-head-row">
      <div class="detail-avatar" id="dAvatar"></div>
      <div>
        <div class="detail-tab" id="dGroup"></div>
        <div class="detail-name" id="dName"></div>
      </div>
    </div>

    <div class="detail-section" id="dTagsSection">
      <h4>Tags</h4>
      <div class="detail-chips" id="dTags"></div>
    </div>

    <div class="detail-section" id="dFactsSection">
      <h4>Notes</h4>
      <div class="detail-facts" id="dFacts"></div>
    </div>

    <div class="detail-section" id="dConnSection">
      <h4>Connections</h4>
      <div id="dConnList"></div>
    </div>

    <div class="sheet-actions">
      <button class="btn btn-ghost" id="editFromDetail">Edit</button>
      <button class="btn btn-primary" id="closeDetailBtn">Done</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "rolodex_people_v1";
  var CATEGORY_KEY = "rolodex_categories_v1";
  var COLLAPSE_KEY = "rolodex_collapse_v1";
  var UNCAT_ID = "__uncat__";

  var people = [];
  var categories = [];
  var collapseState = {};
  var activeTagFilters = [];
  var editingId = null;
  var pendingConnections = [];
  var pendingPhoto = null; // dataURL or null
  var detailPersonId = null;

  // ---------- Persistence ----------
  function loadPeople(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      people = raw ? JSON.parse(raw) : [];
    }catch(e){ people = []; }
  }
  function savePeople(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(people)); }

  function loadCategories(){
    try{
      var raw = localStorage.getItem(CATEGORY_KEY);
      categories = raw ? JSON.parse(raw) : [];
    }catch(e){ categories = []; }
  }
  function saveCategories(){ localStorage.setItem(CATEGORY_KEY, JSON.stringify(categories)); }

  function loadCollapse(){
    try{
      var raw = localStorage.getItem(COLLAPSE_KEY);
      collapseState = raw ? JSON.parse(raw) : {};
    }catch(e){ collapseState = {}; }
  }
  function saveCollapse(){ localStorage.setItem(COLLAPSE_KEY, JSON.stringify(collapseState)); }

  function uid(prefix){
    return (prefix||'p') + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }

  function getPerson(id){
    for(var i=0;i<people.length;i++){ if(people[i].id === id) return people[i]; }
    return null;
  }
  function getCategory(id){
    for(var i=0;i<categories.length;i++){ if(categories[i].id === id) return categories[i]; }
    return null;
  }

  // ---------- One-time migration from the previous data shape ----------
  function migrate(){
    var changed = false, catsChanged = false;
    people.forEach(function(p){
      if(p.notes === undefined){
        var parts = [];
        if(p.facts) parts.push(p.facts);
        if(p.spouse) parts.push('Spouse/partner: ' + p.spouse);
        if(p.family) parts.push('Family: ' + p.family);
        p.notes = parts.join('\n\n');
        delete p.facts; delete p.spouse; delete p.family;
        changed = true;
      }
      if(p.categoryId === undefined){
        if(p.group && p.group.trim()){
          p.categoryId = findOrCreateCategory(p.group.trim());
          catsChanged = true;
        } else {
          p.categoryId = null;
        }
        delete p.group;
        changed = true;
      }
      if(p.photo === undefined){ p.photo = null; changed = true; }
    });
    if(changed) savePeople();
    if(catsChanged) saveCategories();
  }

  function findOrCreateCategory(name){
    var existing = categories.find(function(c){ return c.name.toLowerCase() === name.toLowerCase(); });
    if(existing) return existing.id;
    var cat = { id: uid('c'), name: name };
    categories.push(cat);
    return cat.id;
  }

  // ---------- Toast ----------
  var toastEl = document.getElementById('toast');
  var toastTimer = null;
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
  }

  function initials(name){
    var parts = name.trim().split(/\s+/);
    var s = parts[0] ? parts[0][0] : '';
    if(parts.length > 1) s += parts[parts.length-1][0];
    return s.toUpperCase();
  }

  // ---------- Tag helpers ----------
  function allTags(){
    var set = {};
    people.forEach(function(p){ (p.tags||[]).forEach(function(t){ set[t] = true; }); });
    return Object.keys(set).sort(function(a,b){ return a.localeCompare(b); });
  }

  function renderTagBar(){
    var wrap = document.getElementById('tagScroll');
    var tags = allTags();
    wrap.innerHTML = '';
    tags.forEach(function(t){
      var chip = document.createElement('button');
      chip.className = 'tag-chip' + (activeTagFilters.indexOf(t) > -1 ? ' active' : '');
      chip.textContent = t;
      chip.onclick = function(){
        var idx = activeTagFilters.indexOf(t);
        if(idx > -1){ activeTagFilters.splice(idx,1); } else { activeTagFilters.push(t); }
        renderTagBar();
        renderAll();
      };
      wrap.appendChild(chip);
    });
  }

  // ---------- Filtering ----------
  function matchesSearch(p, q){
    if(!q) return true;
    q = q.toLowerCase();
    var hay = [p.name, p.notes, (p.tags||[]).join(' ')].filter(Boolean).join(' ').toLowerCase();
    return hay.indexOf(q) > -1;
  }
  function matchesTags(p){
    if(activeTagFilters.length === 0) return true;
    var tags = p.tags || [];
    return activeTagFilters.every(function(t){ return tags.indexOf(t) > -1; });
  }

  // ---------- Card ----------
  function buildAvatar(p, sizeClass){
    var av = document.createElement('div');
    av.className = sizeClass;
    if(p.photo){
      av.style.backgroundImage = 'url(' + p.photo + ')';
    } else {
      av.textContent = initials(p.name || '?');
    }
    return av;
  }

  function buildCard(p){
    var card = document.createElement('div');
    card.className = 'card';
    card.onclick = function(){ openDetail(p.id); };

    var row = document.createElement('div');
    row.className = 'card-row';
    row.appendChild(buildAvatar(p, 'avatar'));
    var h3 = document.createElement('h3');
    h3.textContent = p.name;
    row.appendChild(h3);
    card.appendChild(row);

    if(p.notes){
      var prev = document.createElement('div');
      prev.className = 'notes-preview';
      prev.textContent = p.notes;
      card.appendChild(prev);
    }

    if((p.tags||[]).length){
      var chips = document.createElement('div');
      chips.className = 'chips';
      p.tags.slice(0,4).forEach(function(t){
        var c = document.createElement('span');
        c.className = 'chip';
        c.textContent = t;
        chips.appendChild(c);
      });
      card.appendChild(chips);
    }
    return card;
  }

  // ---------- Category accordion ----------
  function renderAll(){
    var q = document.getElementById('searchInput').value.trim();
    var filtering = !!q || activeTagFilters.length > 0;

    var visiblePeople = people.filter(function(p){ return matchesSearch(p,q) && matchesTags(p); });

    document.getElementById('countBadge').textContent =
      people.length + (people.length === 1 ? ' person' : ' people');

    var wrap = document.getElementById('categoriesWrap');
    var empty = document.getElementById('emptyState');
    wrap.innerHTML = '';

    if(people.length === 0){
      empty.style.display = 'block';
      empty.querySelector('h2').textContent = 'No one here yet';
      empty.querySelector('p').textContent = 'Tap the + button to add the first person you want to remember.';
      return;
    }
    if(visiblePeople.length === 0){
      empty.style.display = 'block';
      empty.querySelector('h2').textContent = 'No matches';
      empty.querySelector('p').textContent = 'Try clearing the search or tag filters.';
      return;
    }
    empty.style.display = 'none';

    var sortedCats = categories.slice().sort(function(a,b){ return a.name.localeCompare(b.name); });
    var groups = sortedCats.map(function(c){ return { id: c.id, name: c.name, deletable: true }; });
    groups.push({ id: UNCAT_ID, name: 'Uncategorized', deletable: false });

    groups.forEach(function(g){
      var members = visiblePeople
        .filter(function(p){ return (p.categoryId || UNCAT_ID) === g.id; })
        .sort(function(a,b){ return a.name.localeCompare(b.name); });
      if(members.length === 0) return;

      var section = document.createElement('div');
      section.className = 'cat-section';

      var collapsed = filtering ? false : !!collapseState[g.id];

      var headerEl = document.createElement('div');
      headerEl.className = 'cat-header';
      var chevron = document.createElement('span');
      chevron.className = 'chevron';
      chevron.textContent = collapsed ? '▸' : '▾';
      var nameEl = document.createElement('span');
      nameEl.className = 'cat-name';
      nameEl.textContent = g.name;
      var countEl = document.createElement('span');
      countEl.className = 'cat-count';
      countEl.textContent = members.length;
      headerEl.appendChild(chevron);
      headerEl.appendChild(nameEl);
      headerEl.appendChild(countEl);

      if(g.deletable){
        var delBtn = document.createElement('button');
        delBtn.className = 'cat-del';
        delBtn.textContent = '✕';
        delBtn.onclick = function(e){
          e.stopPropagation();
          if(!confirm('Delete category "' + g.name + '"? People in it move to Uncategorized.')) return;
          categories = categories.filter(function(c){ return c.id !== g.id; });
          people.forEach(function(p){ if(p.categoryId === g.id) p.categoryId = null; });
          delete collapseState[g.id];
          saveCategories(); savePeople(); saveCollapse();
          renderAll();
          showToast('Category deleted');
        };
        headerEl.appendChild(delBtn);
      }

      var body = document.createElement('div');
      body.className = 'cat-body' + (collapsed ? ' collapsed' : '');
      members.forEach(function(p){ body.appendChild(buildCard(p)); });

      headerEl.onclick = function(){
        var nowCollapsed = !body.classList.contains('collapsed');
        body.classList.toggle('collapsed', nowCollapsed);
        chevron.textContent = nowCollapsed ? '▸' : '▾';
        collapseState[g.id] = nowCollapsed;
        saveCollapse();
      };

      section.appendChild(headerEl);
      section.appendChild(body);
      wrap.appendChild(section);
    });
  }

  // ---------- Category select (edit sheet) ----------
  function populateCategorySelect(selectedId){
    var sel = document.getElementById('fCategory');
    sel.innerHTML = '<option value="">Uncategorized</option>';
    categories.slice().sort(function(a,b){ return a.name.localeCompare(b.name); }).forEach(function(c){
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
    sel.value = selectedId || '';
  }

  function promptNewCategory(){
    var name = window.prompt('New category name:');
    if(!name) return null;
    name = name.trim();
    if(!name) return null;
    var id = findOrCreateCategory(name);
    saveCategories();
    return id;
  }

  document.getElementById('addCategoryBtn').onclick = function(){
    var id = promptNewCategory();
    if(id){ renderAll(); showToast('Category added'); }
  };

  document.getElementById('newCatFromEdit').onclick = function(){
    var id = promptNewCategory();
    if(id){
      populateCategorySelect(id);
    }
  };

  // ---------- Photo picker ----------
  var choosePhotoBtn = document.getElementById('choosePhotoBtn');
  var photoInput = document.getElementById('photoInput');
  var photoPreview = document.getElementById('photoPreview');
  var removePhotoBtn = document.getElementById('removePhotoBtn');

  choosePhotoBtn.onclick = function(){ photoInput.click(); };
  photoPreview.onclick = function(){ photoInput.click(); };

  photoInput.onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      var img = new Image();
      img.onload = function(){
        var MAX = 480;
        var w = img.width, h = img.height;
        if(w > h && w > MAX){ h = Math.round(h * (MAX/w)); w = MAX; }
        else if(h > MAX){ w = Math.round(w * (MAX/h)); h = MAX; }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingPhoto = canvas.toDataURL('image/jpeg', 0.82);
        applyPhotoPreview();
      };
      img.onerror = function(){ showToast('Could not read that image'); };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  removePhotoBtn.onclick = function(){
    pendingPhoto = null;
    applyPhotoPreview();
  };

  function applyPhotoPreview(){
    if(pendingPhoto){
      photoPreview.style.backgroundImage = 'url(' + pendingPhoto + ')';
      photoPreview.textContent = '';
      removePhotoBtn.style.display = 'block';
    } else {
      photoPreview.style.backgroundImage = '';
      photoPreview.textContent = '+ Add';
      removePhotoBtn.style.display = 'none';
    }
  }

  // ---------- Edit sheet ----------
  var editOverlay = document.getElementById('editOverlay');

  function populateConnPersonSelect(excludeId){
    var sel = document.getElementById('connPerson');
    sel.innerHTML = '';
    people
      .filter(function(p){ return p.id !== excludeId; })
      .sort(function(a,b){ return a.name.localeCompare(b.name); })
      .forEach(function(p){
        var opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = p.name;
        sel.appendChild(opt);
      });
    if(sel.options.length === 0){
      var opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'Add another person first';
      sel.appendChild(opt);
    }
  }

  function renderConnList(){
    var wrap = document.getElementById('connList');
    wrap.innerHTML = '';
    pendingConnections.forEach(function(c, idx){
      var target = getPerson(c.targetId);
      var row = document.createElement('div');
      row.className = 'conn-item';
      var label = document.createElement('span');
      label.textContent = (c.label ? c.label + ' — ' : '') + (target ? target.name : '(unknown)');
      var del = document.createElement('button');
      del.textContent = '✕';
      del.onclick = function(){ pendingConnections.splice(idx,1); renderConnList(); };
      row.appendChild(label);
      row.appendChild(del);
      wrap.appendChild(row);
    });
  }

  function openEditSheet(id, presetCategoryId){
    editingId = id || null;
    var p = id ? getPerson(id) : null;

    document.getElementById('editTitle').textContent = p ? 'Edit ' + p.name : 'New person';
    document.getElementById('fName').value = p ? p.name : '';
    document.getElementById('fTags').value = p ? (p.tags||[]).join(', ') : '';
    document.getElementById('fNotes').value = p ? (p.notes||'') : '';
    document.getElementById('deleteBtn').style.display = p ? 'block' : 'none';

    pendingPhoto = p ? (p.photo || null) : null;
    applyPhotoPreview();

    populateCategorySelect(p ? p.categoryId : (presetCategoryId || ''));

    pendingConnections = p ? (p.connections||[]).map(function(c){ return {targetId:c.targetId, label:c.label}; }) : [];
    populateConnPersonSelect(id);
    renderConnList();

    editOverlay.classList.add('open');
    document.getElementById('fName').focus();
  }

  function closeEditSheet(){
    editOverlay.classList.remove('open');
    editingId = null;
  }

  document.getElementById('addFab').onclick = function(){ openEditSheet(null); };
  document.getElementById('closeEdit').onclick = closeEditSheet;
  editOverlay.addEventListener('click', function(e){ if(e.target === editOverlay) closeEditSheet(); });

  document.getElementById('connAdd').onclick = function(){
    var sel = document.getElementById('connPerson');
    var labelInput = document.getElementById('connLabel');
    if(!sel.value) return;
    pendingConnections.push({ targetId: sel.value, label: labelInput.value.trim() });
    labelInput.value = '';
    renderConnList();
  };

  document.getElementById('saveBtn').onclick = function(){
    var name = document.getElementById('fName').value.trim();
    if(!name){ showToast('Name is required'); return; }

    var tags = document.getElementById('fTags').value
      .split(',').map(function(t){ return t.trim(); }).filter(Boolean);

    var catVal = document.getElementById('fCategory').value;

    var record = {
      id: editingId || uid('p'),
      name: name,
      categoryId: catVal || null,
      tags: tags,
      notes: document.getElementById('fNotes').value.trim(),
      photo: pendingPhoto,
      connections: pendingConnections.slice()
    };

    if(editingId){
      var idx = people.findIndex(function(p){ return p.id === editingId; });
      people[idx] = record;
    } else {
      people.push(record);
    }

    syncReciprocalConnections(record);
    savePeople();
    renderTagBar();
    renderAll();
    closeEditSheet();
    showToast('Saved');
  };

  // Keep the other side of a link in sync.
  function syncReciprocalConnections(record){
    record.connections.forEach(function(c){
      var target = getPerson(c.targetId);
      if(!target) return;
      target.connections = target.connections || [];
      var already = target.connections.some(function(tc){ return tc.targetId === record.id; });
      if(!already){
        target.connections.push({ targetId: record.id, label: '' });
      }
    });
  }

  document.getElementById('deleteBtn').onclick = function(){
    if(!editingId) return;
    if(!confirm('Delete this person? This can\'t be undone.')) return;
    people = people.filter(function(p){ return p.id !== editingId; });
    people.forEach(function(p){
      p.connections = (p.connections||[]).filter(function(c){ return c.targetId !== editingId; });
    });
    savePeople();
    renderTagBar();
    renderAll();
    closeEditSheet();
    showToast('Deleted');
  };

  // ---------- Detail sheet ----------
  var detailOverlay = document.getElementById('detailOverlay');

  function openDetail(id){
    var p = getPerson(id);
    if(!p) return;
    detailPersonId = id;

    var cat = p.categoryId ? getCategory(p.categoryId) : null;
    document.getElementById('dGroup').textContent = cat ? cat.name : 'Uncategorized';
    document.getElementById('dName').textContent = p.name;

    var avatarWrap = document.getElementById('dAvatar');
    avatarWrap.innerHTML = '';
    avatarWrap.style.backgroundImage = '';
    if(p.photo){
      avatarWrap.style.backgroundImage = 'url(' + p.photo + ')';
    } else {
      avatarWrap.textContent = initials(p.name || '?');
    }

    var tagsSection = document.getElementById('dTagsSection');
    var tagsWrap = document.getElementById('dTags');
    tagsWrap.innerHTML = '';
    if((p.tags||[]).length){
      tagsSection.style.display = 'block';
      p.tags.forEach(function(t){
        var c = document.createElement('span');
        c.className = 'detail-chip';
        c.textContent = t;
        tagsWrap.appendChild(c);
      });
    } else {
      tagsSection.style.display = 'none';
    }

    var factsSection = document.getElementById('dFactsSection');
    if(p.notes){
      factsSection.style.display = 'block';
      document.getElementById('dFacts').textContent = p.notes;
    } else {
      factsSection.style.display = 'none';
    }

    var connSection = document.getElementById('dConnSection');
    var connWrap = document.getElementById('dConnList');
    connWrap.innerHTML = '';
    var conns = p.connections || [];
    var anyRendered = false;
    conns.forEach(function(c){
      var target = getPerson(c.targetId);
      if(!target) return;
      anyRendered = true;
      var row = document.createElement('div');
      row.className = 'link-card';
      row.onclick = function(){ openDetail(target.id); };
      var left = document.createElement('div');
      var rel = document.createElement('div');
      rel.className = 'rel';
      rel.textContent = c.label || 'connected';
      var nm = document.createElement('div');
      nm.className = 'nm';
      nm.textContent = target.name;
      left.appendChild(rel);
      left.appendChild(nm);
      var arrow = document.createElement('div');
      arrow.className = 'arrow';
      arrow.textContent = '→';
      row.appendChild(left);
      row.appendChild(arrow);
      connWrap.appendChild(row);
    });
    connSection.style.display = anyRendered ? 'block' : 'none';

    detailOverlay.classList.add('open');
  }

  function closeDetail(){
    detailOverlay.classList.remove('open');
    detailPersonId = null;
  }

  document.getElementById('closeDetail').onclick = closeDetail;
  document.getElementById('closeDetailBtn').onclick = closeDetail;
  detailOverlay.addEventListener('click', function(e){ if(e.target === detailOverlay) closeDetail(); });
  document.getElementById('editFromDetail').onclick = function(){
    var id = detailPersonId;
    closeDetail();
    openEditSheet(id);
  };

  // ---------- Search ----------
  document.getElementById('searchInput').addEventListener('input', renderAll);

  // ---------- Backup / restore ----------
  document.getElementById('exportBtn').onclick = function(){
    var payload = { people: people, categories: categories };
    var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'rolodex-backup-' + new Date().toISOString().slice(0,10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Backup downloaded');
  };

  document.getElementById('importBtn').onclick = function(){
    document.getElementById('importFile').click();
  };
  document.getElementById('importFile').onchange = function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        var newPeople, newCats;
        if(Array.isArray(data)){
          // old-format backup (people array only)
          newPeople = data; newCats = categories;
        } else if(data && Array.isArray(data.people)){
          newPeople = data.people; newCats = Array.isArray(data.categories) ? data.categories : [];
        } else {
          throw new Error('bad format');
        }
        if(people.length > 0){
          if(!confirm('This will replace your current ' + people.length + ' entries with ' + newPeople.length + ' from the backup. Continue?')) return;
        }
        people = newPeople;
        categories = newCats;
        migrate();
        savePeople();
        saveCategories();
        renderTagBar();
        renderAll();
        showToast('Backup restored');
      }catch(err){
        showToast('Could not read that file');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  // ---------- Service worker (offline support) ----------
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){ /* fine if it fails */ });
    });
  }

  // ---------- Init ----------
  loadCategories();
  loadPeople();
  loadCollapse();
  migrate();
  renderTagBar();
  renderAll();
})();
</script>
</body>
</html>
